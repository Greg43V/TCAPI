<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F7F5F0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Event — Grove Event Corp</title>
<meta name="description" content="Live prices and official tickets for Premier League matches. Grove Event Corp." />
<style>
:root{
  --paper:#F6F4EF; --card:#FFFFFF; --ink:#0E1826; --ink-2:#3B4657;
  --muted:#727D8C; --line:#E4E0D7; --line-2:#EEEBE3;
  --accent:#14655A;        /* teal-green primary */
  --accent-dk:#0E4A42;
  --accent-soft:#E7F0EE;
  --blue:#1E5BD6;          /* blue secondary */
  --blue-dk:#1848AC;
  --blue-soft:#E8EFFD;
  --danger:#C0492B; --danger-soft:#FBEBE6;
  --r:4px;                 /* sharper */
  --r-lg:6px;
  --sans:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
  font-size:16.5px;line-height:1.6;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
a{color:inherit;text-decoration:none}
img,iframe{max-width:100%}
.wrap{max-width:1020px;margin:0 auto;padding:0 18px}
.narrow{max-width:680px}

/* header */
header{position:sticky;top:0;z-index:30;background:rgba(246,244,239,.9);
  backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:56px}
.brand{font-weight:800;letter-spacing:-.03em;font-size:17px}
.brand span{color:var(--accent)}
.navlink{font-size:14px;font-weight:500;color:var(--muted);padding:10px 2px}
.navlink:hover{color:var(--ink)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;
  padding:0 20px;border-radius:var(--r);font-size:15px;font-weight:600;letter-spacing:-.01em;
  border:1px solid transparent;cursor:pointer;font-family:inherit;transition:background .14s,border-color .14s,color .14s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dk)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dk)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--ink);background:#fff}
.btn-block{width:100%}

/* type */
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);font-weight:500}
.eyebrow.blue{color:var(--blue)}
h1{font-size:clamp(31px,7.2vw,48px);line-height:1.06;letter-spacing:-.035em;font-weight:800;margin:12px 0 14px}
h2{font-size:clamp(23px,4.6vw,32px);line-height:1.14;letter-spacing:-.03em;font-weight:800;margin:10px 0 12px}
h3{font-size:18px;line-height:1.28;letter-spacing:-.02em;font-weight:700;margin:0 0 6px}
p{margin:0 0 14px;color:var(--ink-2)}
.lede{font-size:18px;color:var(--ink-2);letter-spacing:-.01em}
.small{font-size:14px;color:var(--muted)}
.section{padding:44px 0}
.section + .section{border-top:1px solid var(--line)}
@media(min-width:820px){ .section{padding:72px 0} }

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px}
.grid{display:grid;gap:14px}
@media(min-width:760px){ .grid-3{grid-template-columns:repeat(3,1fr)} }
/* accent top-rule for feature cards */
.card-top{border-top:3px solid var(--accent)}
.card-top.blue{border-top-color:var(--blue)}
.card-top.gold{border-top-color:#C58B2E}

/* stats */
.stats{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 22px;padding:0;list-style:none}
.stats li{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);
  padding:9px 13px;font-size:13px;color:var(--muted)}
.stats b{display:block;font-family:var(--mono);font-size:16px;color:var(--ink);font-weight:500}

/* fixture rows */
.rows{margin-top:6px}
.row{display:block;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);
  border-radius:var(--r);padding:14px 16px;margin-bottom:9px;transition:border-color .14s,transform .07s}
.row:hover{border-color:var(--line);border-left-color:var(--accent)}
.row:active{transform:translateY(1px)}
.row-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.row-date{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.02em}
.row-name{font-size:17px;font-weight:700;letter-spacing:-.02em;margin:4px 0 0}
.row-venue{font-size:13px;color:var(--muted);margin-top:2px}
.row-bottom{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
.price{font-family:var(--mono);font-size:17px;font-weight:500}
.price .lbl{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--sans);font-weight:600}
.go{font-size:14px;font-weight:600;color:var(--blue)}
.chip{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 8px;border-radius:var(--r);background:var(--accent-soft);color:var(--accent-dk)}
.chip-blue{background:var(--blue-soft);color:var(--blue-dk)}
.chip-out{background:var(--danger-soft);color:var(--danger)}
.groupline{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line-2)}

/* forms */
input,select,textarea{width:100%;min-height:48px;padding:12px 14px;font:inherit;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:var(--r)}
textarea{min-height:110px;resize:vertical}
input::placeholder,textarea::placeholder{color:var(--muted)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue);outline-offset:1px;border-color:transparent}
label.fl{display:block;font-size:13px;font-weight:600;margin:0 0 6px}
.field{margin-bottom:14px}

.state{padding:34px 4px;text-align:center;color:var(--muted)}
footer{border-top:1px solid var(--line);padding:26px 0;color:var(--muted);font-size:14px}
::selection{background:var(--blue-soft)}
a:focus-visible,button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

.opt{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 0;border-bottom:1px solid var(--line-2)}
.opt:last-child{border-bottom:none}
.opt .oname{font-weight:600;font-size:16px}
.opt .oqty{font-size:12px;color:var(--muted)}
.opt .oprice{font-family:var(--mono);font-size:16px;text-align:right}
.map{border:0;width:100%;height:220px;border-radius:var(--r);filter:grayscale(.2)}
.mapcard{overflow:hidden}
.venue-addr{font-size:14px;color:var(--muted);margin-top:10px}
.venue-addr a{color:var(--accent);font-weight:600}
/* booking sheet — bottom sheet on mobile */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(10,12,11,.5);z-index:50}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--card);
  border-radius:16px 16px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  max-height:92vh;overflow:auto;display:none}
@media(min-width:620px){ .sheet{left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-50%);
  max-width:440px;width:100%;border-radius:var(--r)} }
.sheet.open,.sheet-bg.open{display:block}
.sheet h3{font-size:19px}
.sheet .close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:26px;color:var(--muted);cursor:pointer;min-height:auto;padding:0;width:auto}
.total{display:flex;justify-content:space-between;align-items:center;margin:14px 0;font-size:15px}
.total b{font-family:var(--mono);font-size:20px}
.agree{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--muted);margin:14px 0}
.agree input{width:auto;min-height:auto;margin-top:3px}
.bm-msg{font-size:13px;min-height:16px;margin:8px 0 0}

/* THEME */
:root{ --accent:#C8102E; --accent-dk:#9E0C24; --accent-soft:#FBE7EA; } .btn-primary{background:var(--blue)} .btn-primary:hover{background:var(--blue-dk)} .price{color:var(--blue-dk)} .row:hover{border-left-color:var(--blue)} .go{color:var(--accent)} .chip{background:var(--blue-soft);color:var(--blue-dk)} .eyebrow{color:var(--blue)} .herobox::before{background:linear-gradient(var(--blue),var(--accent))} .brand span{color:var(--blue)}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <a class="brand" href="/">Grove <span>Event Corp</span></a>
    <a class="navlink" href="/premier-league/">&larr; Fixtures</a>
  </div>
</header>

<main class="wrap narrow" id="app">
  <section style="padding:24px 0 4px">
    <div class="eyebrow" id="eyebrow">Football &middot; Official tickets</div>
    <h1 id="title">Loading…</h1>
    <p class="lede" id="meta"></p>
  </section>

  <div id="board"><div class="state">Fetching live prices…</div></div>

  <div id="mapwrap"></div>

  <p class="small" id="note" hidden style="margin-top:18px">Prices are live from our supplier, per ticket, package inclusive. Availability and price are confirmed when we contact you. Official tickets only.</p>
</main>

<footer><div class="wrap">&copy; 2026 Grove Event Corp (Pty) Ltd</div></footer>

<!-- booking sheet -->
<div class="sheet-bg" id="sheetBg" onclick="closeBooking()"></div>
<div class="sheet" id="sheet">
  <button class="close" onclick="closeBooking()">&times;</button>
  <div class="bm-body">
    <div class="eyebrow bm-sub"></div>
    <h3 class="bm-title" style="margin:4px 0 0"></h3>
    <div class="total"><span>Tickets
      <select id="bm-qty" onchange="updateTotal()" style="display:inline-block;width:auto;min-height:40px;margin-left:8px"></select></span>
      <b class="bm-total"></b></div>
    <div class="field"><input id="bm-fn" placeholder="First name" autocomplete="given-name"></div>
    <div class="field"><input id="bm-ln" placeholder="Last name" autocomplete="family-name"></div>
    <div class="field"><input id="bm-email" type="email" placeholder="Email" autocomplete="email"></div>
    <div class="field"><input id="bm-phone" type="tel" placeholder="Contact phone" autocomplete="tel"></div>
    <label class="agree"><input id="bm-agree" type="checkbox">
      <span>I'd like Grove Event Corp to <strong>hold these seats</strong> and contact me to complete the booking. Official tickets only.</span></label>
    <p class="bm-msg"></p>
    <button class="btn btn-primary btn-block bm-submit" onclick="submitBooking()">Request these seats</button>
  </div>
</div>

<script>
var EV=null;
var params=new URLSearchParams(location.search), eventId=params.get("event");
var board=document.getElementById("board");
function money(cur,a){ var s={GBP:"\u00a3",EUR:"\u20ac",USD:"$",ZAR:"R",AUD:"A$"}[cur]||(cur+" "); return s+Number(a).toLocaleString("en-GB"); }
function fmtDate(iso){ if(!iso)return""; try{return new Date(iso).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" · "+new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}catch(e){return"";} }

if(!eventId){ board.innerHTML='<div class="state">No event specified.</div>'; }
else fetch("/.netlify/functions/tc-prices?products="+encodeURIComponent(eventId))
 .then(function(r){return r.json();})
 .then(function(data){
   if(data && data.warming){ board.innerHTML='<div class="state">Prices are updating…</div>'; setTimeout(function(){location.reload();},12000); return; }
   var p=data.products && data.products[0]; if(!p) throw 0; EV=p;
   document.title=p.name+" — Grove Event Corp";
   document.getElementById("title").textContent=p.name;
   document.getElementById("meta").textContent=fmtDate(p.date);

   if(p.sold_out){
     board.innerHTML='<div class="card"><div class="chip chip-out">Currently sold out</div>'
       +'<p style="margin-top:12px">New allocation can be released before the match. '
       +'<a href="/#contact" style="color:var(--accent);font-weight:600">Register interest &rarr;</a></p></div>';
   } else {
     var rows=p.options.map(function(o,i){
       return '<div class="opt"><div><div class="oname">'+o.name+'</div>'
         +'<div class="oqty">Up to '+o.max_qty+' tickets</div></div>'
         +'<div style="display:flex;align-items:center;gap:14px">'
         +'<div class="oprice">'+money(p.currency,o.price)+'</div>'
         +'<button class="btn btn-primary" style="min-height:40px;padding:0 14px;font-size:14px" onclick="openBooking('+i+')">Request</button>'
         +'</div></div>';
     }).join("");
     board.innerHTML='<div class="card"><div class="eyebrow">Seating &amp; packages</div>'
       +'<h3 style="margin:6px 0 6px">From '+money(p.currency,p.from)+' per ticket</h3>'+rows+'</div>';
     document.getElementById("note").hidden=false;
   }

   // Stadium map
   if(p.venue && p.venue.lat && p.venue.lng){
     var la=p.venue.lat, ln=p.venue.lng, d=0.008;
     var bbox=(ln-d)+","+(la-d/2)+","+(ln+d)+","+(la+d/2);
     var osm="https://www.openstreetmap.org/export/embed.html?bbox="+bbox+"&layer=mapnik&marker="+la+","+ln;
     var gmaps="https://www.google.com/maps/search/?api=1&query="+la+","+ln;
     document.getElementById("mapwrap").innerHTML=
       '<div class="card mapcard" style="margin-top:14px;padding:0">'
       +'<iframe class="map" loading="lazy" src="'+osm+'"></iframe>'
       +'<div style="padding:14px 16px"><h3 style="margin:0">'+(p.venue.name||"Stadium")+'</h3>'
       +'<div class="venue-addr">'+(p.venue.address||"")+' &middot; <a href="'+gmaps+'" target="_blank" rel="noopener" style="color:var(--blue)">Open in Maps &rarr;</a></div></div></div>';
   }
 })
 .catch(function(){ board.innerHTML='<div class="state">Live prices are temporarily unavailable. Please <a href="/#contact" style="color:var(--accent)">enquire</a> and we\'ll quote you directly.</div>'; });

function openBooking(i){
  var o=EV.options[i], maxQ=Math.min(o.max_qty||6,6), q="";
  for(var k=1;k<=maxQ;k++) q+='<option value="'+k+'">'+k+'</option>';
  var s=document.getElementById("sheet");
  s.querySelector(".bm-title").textContent=o.name;
  s.querySelector(".bm-sub").textContent=EV.name;
  s.dataset.opt=o.ticket_option; s.dataset.unit=o.price; s.dataset.cur=EV.currency;
  s.querySelector("#bm-qty").innerHTML=q; s.querySelector(".bm-msg").textContent="";
  updateTotal();
  document.getElementById("sheetBg").classList.add("open"); s.classList.add("open");
}
function closeBooking(){ document.getElementById("sheet").classList.remove("open"); document.getElementById("sheetBg").classList.remove("open"); }
function updateTotal(){ var s=document.getElementById("sheet"); var q=parseInt(s.querySelector("#bm-qty").value,10)||1;
  s.querySelector(".bm-total").textContent=money(s.dataset.cur,q*parseFloat(s.dataset.unit||0)); }
function submitBooking(){
  var s=document.getElementById("sheet"), msg=s.querySelector(".bm-msg"), btn=s.querySelector(".bm-submit");
  var data={ ticket_option:parseInt(s.dataset.opt,10), quantity:parseInt(s.querySelector("#bm-qty").value,10),
    first_name:s.querySelector("#bm-fn").value, last_name:s.querySelector("#bm-ln").value,
    email:s.querySelector("#bm-email").value, phone:s.querySelector("#bm-phone").value };
  if(!s.querySelector("#bm-agree").checked){ msg.style.color="var(--danger)"; msg.textContent="Please tick the box to continue."; return; }
  msg.style.color="var(--muted)"; msg.textContent="Holding your seats…"; btn.disabled=true;
  fetch("/.netlify/functions/tc-reserve",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(data)})
   .then(function(r){return r.json();}).then(function(res){ btn.disabled=false;
     if(res.ok){ s.querySelector(".bm-body").innerHTML='<div style="text-align:center;padding:8px 0">'
       +'<div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:8px">Seats requested &check;</div>'
       +'<p>Reference <strong>'+res.reservation_num+'</strong> — '+money(res.currency,res.total)+'.</p>'
       +'<p class="small">We\'ve placed a short hold and will contact you shortly to confirm and take payment. Nothing is charged yet. '
       +'Questions? <a href="mailto:orders@grovecorp.org" style="color:var(--accent)">orders@grovecorp.org</a></p>'
       +'<button class="btn btn-ghost btn-block" onclick="closeBooking()" style="margin-top:8px">Done</button></div>'; }
     else { msg.style.color="var(--danger)"; msg.textContent=res.error||"Something went wrong. Please try again."; }
   }).catch(function(){ btn.disabled=false; msg.style.color="var(--danger)"; msg.textContent="Network error — please try again."; });
}
</script>
</body>
</html>
